<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QR Code Generator{% endblock %}</title>
    <link rel="stylesheet" href="{% load static %}{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="qr-icon">⬛</span>
                <h1>QR Code Generator</h1>
            </div>
        </header>
        
        <main>
            {% block content %}
            {% endblock %}
        </main>
        
        <footer>
            <p>Made with ❤️ using Django | Simple & Easy QR Code Generator</p>
        </footer>
    </div>
</body>
</html>
